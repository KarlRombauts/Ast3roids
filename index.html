<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <!-- Installable / standalone so "Add to Home Screen" runs truly fullscreen
       (the only way to hide Safari's chrome on iPhone). -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AST3ROIDS">
  <meta name="theme-color" content="#05060a">
  <link rel="manifest" href="manifest.json">
  <title>AST3ROIDS — WebGL / WebAssembly</title>
  <style>
    :root { --accent: #4aa3ff; --accent-dim: #2b6cb0; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%;
      background: radial-gradient(1200px 800px at 50% -10%, #10131f 0%, #05060a 60%, #000 100%);
      color: #cdd6e6;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      -webkit-font-smoothing: antialiased;
    }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100%; gap: 18px; padding: 24px; }

    h1.brand {
      margin: 0; font-size: 28px; letter-spacing: 0.5em; font-weight: 800;
      color: #eef3ff; text-indent: 0.5em;
      text-shadow: 0 0 18px rgba(74,163,255,0.55);
    }
    .subtitle { margin: -8px 0 4px; font-size: 12px; letter-spacing: 0.25em; color: #6b7690; text-transform: uppercase; }

    /* Game frame */
    #stage {
      position: relative; width: 600px; height: 600px; max-width: 92vw; max-height: 92vw;
      border: 1px solid rgba(74,163,255,0.35);
      border-radius: 10px; overflow: hidden;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.6), 0 20px 60px rgba(0,0,0,0.6), inset 0 0 60px rgba(74,163,255,0.06);
    }
    #canvas { display: block; width: 100%; height: 100%; background: #000; outline: none; }

    /* Fullscreen */
    #fs-btn {
      position: absolute; bottom: 10px; right: 10px; z-index: 5;
      pointer-events: auto; cursor: pointer; width: 32px; height: 32px; padding: 0;
      font-size: 15px; line-height: 1; color: #cdd6e6;
      background: rgba(10,14,22,0.55); border: 1px solid rgba(74,163,255,0.3); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s ease, border-color .15s ease;
    }
    #fs-btn:hover { background: rgba(20,28,44,0.85); border-color: rgba(74,163,255,0.6); }
    #stage:fullscreen, #stage:-webkit-full-screen {
      width: 100%; height: 100%; max-width: none; max-height: none; border: none; border-radius: 0;
    }

    /* HUD */
    #hud {
      position: absolute; inset: 0; pointer-events: none;
      display: none; padding: 12px 14px; font-size: 13px; letter-spacing: 0.08em;
      color: #dfe7f5; text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }
    #hud.show { display: block; }
    #hud .row { display: flex; justify-content: space-between; }
    #hud .center { position: absolute; left: 50%; top: 12px; transform: translateX(-50%); }
    #hud b { color: var(--accent); font-weight: 700; }

    /* Menu overlay */
    #menu {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px; text-align: center;
      background: radial-gradient(60% 60% at 50% 45%, rgba(5,8,16,0.55), rgba(2,3,6,0.86));
      backdrop-filter: blur(2px);
    }
    #menu.hidden { display: none; }
    #menu .title { font-size: 40px; letter-spacing: 0.18em; font-weight: 800; color: #fff; text-shadow: 0 0 24px rgba(74,163,255,0.6); }
    #menu .msg { font-size: 14px; color: #9fb0cc; }
    #menu .score { font-size: 15px; color: #cdd6e6; }
    button.play {
      pointer-events: auto; cursor: pointer; margin-top: 6px;
      font: inherit; font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase;
      color: #eaf2ff; background: linear-gradient(180deg, var(--accent), var(--accent-dim));
      border: none; border-radius: 8px; padding: 12px 28px;
      box-shadow: 0 6px 20px rgba(74,163,255,0.35); transition: transform .08s ease, box-shadow .15s ease;
    }
    button.play:hover { transform: translateY(-1px); box-shadow: 0 8px 26px rgba(74,163,255,0.5); }
    button.play:active { transform: translateY(0); }

    .controls { font-size: 12px; color: #6b7690; letter-spacing: 0.06em; text-align: center; max-width: 600px; line-height: 1.7; }
    .controls kbd { color: #b9c6de; background: #161b28; border: 1px solid #29324a; border-radius: 4px; padding: 1px 6px; }
    footer { font-size: 11px; color: #424b5e; letter-spacing: 0.1em; text-align: center; }
    footer a { color: #6b7690; text-decoration: none; border-bottom: 1px solid #2a3346; }
    footer a:hover { color: var(--accent); border-bottom-color: var(--accent); }

    button.play[disabled] { opacity: 0.5; cursor: default; box-shadow: none; filter: grayscale(0.4); }

    /* Loading bar (shown while the WASM + assets download) */
    #loadbar { width: 220px; max-width: 60vw; height: 6px; margin-top: 2px;
      background: rgba(74,163,255,0.15); border-radius: 3px; overflow: hidden; }
    #loadbar-fill { height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      box-shadow: 0 0 10px rgba(74,163,255,0.6); transition: width .2s ease; }
    #loadbar.hidden { display: none; }
    #canvas { touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }

    /* Rotate-to-landscape nudge (mobile, app mode only) */
    #rotate {
      position: fixed; inset: 0; z-index: 30; display: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 14px;
      background: #05060a; color: #cdd6e6; text-align: center; padding: 24px;
    }
    #rotate .icon { font-size: 46px; animation: rot 2s ease-in-out infinite; }
    @keyframes rot { 0%,100% { transform: rotate(0); } 50% { transform: rotate(90deg); } }

    /* App (touch) mode: the stage fills the screen and the page chrome hides. */
    body.app { padding: 0; gap: 0; overflow: hidden; }
    body.app .brand, body.app .subtitle, body.app .controls, body.app footer { display: none; }
    body.app #stage {
      position: fixed; inset: 0; width: 100vw; height: 100vh; height: 100dvh;
      max-width: none; max-height: none; border: none; border-radius: 0;
    }
    body.app.portrait #rotate { display: flex; }
    body.app #fs-btn { display: none; }
  </style>
</head>
<body>
  <h1 class="brand">AST3ROIDS</h1>
  <div class="subtitle">C++ · WebAssembly · WebGL2</div>

  <div id="stage">
    <canvas id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()" width="600" height="600"></canvas>

    <div id="hud">
      <div class="row">
        <span>SCORE <b id="hud-score">0</b></span>
        <span>TIME <b id="hud-time">0:00</b></span>
      </div>
      <div class="center">WAVE <b id="hud-wave">1</b></div>
    </div>

    <div id="menu">
      <div class="title">AST3ROIDS</div>
      <div class="msg" id="menu-msg">Loading…</div>
      <div id="loadbar"><div id="loadbar-fill"></div></div>
      <div class="score" id="menu-score"></div>
      <button class="play" id="play-btn" onclick="startGame()" disabled>Play</button>
    </div>

    <button id="fs-btn" onclick="toggleFullscreen()" title="Fullscreen">&#x26F6;</button>

    <div id="rotate">
      <div class="icon">&#x1F4F1;</div>
      <div>Rotate your device to landscape</div>
    </div>
  </div>

  <div class="controls">
    <kbd>F</kbd> thrust &nbsp; <kbd>A</kbd>/<kbd>D</kbd> roll &nbsp; <kbd>Mouse</kbd> aim &nbsp;
    <kbd>Space</kbd> fire &nbsp; <kbd>I</kbd>/<kbd>K</kbd> camera
  </div>
  <footer>
    Originally a desktop OpenGL game — renderer rewritten to WebGL2 and compiled to WASM.
    &nbsp;·&nbsp;
    <a href="https://github.com/KarlRombauts/Ast3roids" target="_blank" rel="noopener">View source on GitHub&nbsp;&#8599;</a>
  </footer>

  <script>
    var canvas = document.getElementById('canvas');
    var menuEl = document.getElementById('menu');
    var hudEl = document.getElementById('hud');
    var playBtn = document.getElementById('play-btn');
    var stageEl = document.getElementById('stage');

    // Touch-primary device? (coarse pointer + no hover). This deliberately
    // excludes touch-capable laptops, which still steer with the mouse.
    var isTouch = window.matchMedia('(pointer: coarse)').matches &&
                  window.matchMedia('(hover: none)').matches;
    // The game needs WebGL2 (iOS 15+). Detect up front so we can say so instead
    // of showing a silent black canvas.
    // Feature-detect the WebGL2 interface (defined on iOS 15+ and every modern
    // browser, absent on older iOS). This avoids creating a probe context, which
    // is unreliable and can starve the game's context on single-context phones.
    var hasWebGL2 = (typeof WebGL2RenderingContext !== 'undefined');
    var runtimeReady = false;

    // --- aim/point steering tuning ---
    // Steering comes from where the back of the phone points (its compass heading
    // + up/down elevation), measured as deviation from your start orientation.
    var YAW_RANGE = 40;         // deg of heading change (look left/right) for a full-strength turn
    var PITCH_RANGE = 35;       // deg of elevation change (look up/down) for full strength
    var TILT_DEADZONE = 0.1;    // fraction near the start direction that does nothing (fly straight)
    var TILT_EXPONENT = 1.6;    // >1: gentle near neutral, progressively stronger as you look further
    var TILT_SMOOTH = 0.25;     // low-pass smoothing (0..1, higher = snappier/noisier)
    var TILT_INVERT_X = false;  // flip if looking right turns the ship left
    var TILT_INVERT_Y = false;  // flip if looking up makes the ship dive
    var ROLL_RANGE = 35;        // deg of phone bank (tilt left/right) for a full-rate ship roll
    var TILT_INVERT_ROLL = true;  // flip if banking the phone rolls the ship the wrong way
    var ZOOM_SCALE = 0.06;      // slide pixels -> camera dolly (world units)

    function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
    function fmtTime(ms) {
      var s = Math.max(0, Math.floor(ms / 1000));
      return Math.floor(s / 60) + ':' + ('0' + (s % 60)).slice(-2);
    }

    // Game states (match GameState enum order in GameModel.h)
    var ST = { GAME_OVER: 0, WAVE_OVER: 1, PLAYING: 2, START: 3, PLAY_AGAIN: 4, GAME_OVER_TRANSITION: 5 };

    var startHint = isTouch
      ? 'Aim the phone to steer · tap to shoot · slide to zoom'
      : 'Press <kbd>SPACE</kbd> to start';

    // Reflect load/support state on the menu before the game loop takes over.
    function setReadyUI() {
      var loadbar = document.getElementById('loadbar');
      if (!hasWebGL2) {
        document.getElementById('menu-msg').innerHTML =
          'This game needs <b>WebGL2</b>.<br>Update to iOS&nbsp;15+ or use a current browser.';
        playBtn.style.display = 'none';
        loadbar.classList.add('hidden');
        return;
      }
      if (!runtimeReady) return;
      playBtn.disabled = false;
      document.getElementById('menu-msg').innerHTML = startHint;
      loadbar.classList.add('hidden');
    }

    // Called every frame from C++ via EM_ASM.
    function gameUpdate(state, score, wave, timeMs) {
      if (!runtimeReady) { runtimeReady = true; setReadyUI(); } // loop is running -> ready
      // Mobile auto-thrust: re-assert every playing frame, because starting a
      // game clears all held keys (incl. the forward key) on the first frame.
      if (isTouch && state === ST.PLAYING && Module._web_set_thrust) Module._web_set_thrust(1);
      var inMenu = (state === ST.START || state === ST.PLAY_AGAIN || state === ST.GAME_OVER);
      menuEl.classList.toggle('hidden', !inMenu);
      hudEl.classList.toggle('show', !inMenu);

      if (state === ST.GAME_OVER) {
        document.querySelector('#menu .title').textContent = 'GAME OVER';
        document.getElementById('menu-msg').innerHTML =
          isTouch ? 'Tap <b>Play</b> to play again' : 'Press <kbd>SPACE</kbd> to play again';
        document.getElementById('menu-score').textContent = 'Final score: ' + score;
      } else if (inMenu) {
        document.querySelector('#menu .title').textContent = 'AST3ROIDS';
        document.getElementById('menu-msg').innerHTML = startHint;
        document.getElementById('menu-score').textContent = '';
      }

      document.getElementById('hud-score').textContent = score;
      document.getElementById('hud-wave').textContent = wave;
      document.getElementById('hud-time').textContent = fmtTime(timeMs);
    }

    // Play button.
    function startGame() {
      if (!runtimeReady || !hasWebGL2) return;
      canvas.focus();
      if (isTouch) {
        enterAppMode();
        if (!mobileInited) enableMobileControls(); // permission must be inside this gesture
        // (auto-thrust is asserted each frame in gameUpdate, after the engine
        // clears held keys on the starting frame)
      }
      if (Module._web_press_space) Module._web_press_space();
    }

    function toggleFullscreen() {
      var fsEl = document.fullscreenElement || document.webkitFullscreenElement;
      if (!fsEl) {
        (stageEl.requestFullscreen || stageEl.webkitRequestFullscreen || function () {}).call(stageEl);
      } else {
        (document.exitFullscreen || document.webkitExitFullscreen || function () {}).call(document);
      }
    }

    // ---- Desktop steering: cursor position -> normalized [-1,1] aim ----
    function setAim(nx, ny) { if (Module && Module._web_set_aim) Module._web_set_aim(nx, ny); }
    if (!isTouch) {
      canvas.addEventListener('mousemove', function (e) {
        var r = canvas.getBoundingClientRect();
        var nx = (e.clientX - r.left) / r.width * 2 - 1;
        var ny = (e.clientY - r.top) / r.height * 2 - 1;
        setAim(clamp(nx, -1, 1), clamp(ny, -1, 1));
      });
      canvas.addEventListener('mouseleave', function () { setAim(0, 0); });
    }

    // ---- Mobile: app-mode layout, tilt steering, touch fire/zoom ----
    function enterAppMode() {
      document.body.classList.add('app');
      updatePortrait();
      var rf = stageEl.requestFullscreen || stageEl.webkitRequestFullscreen;
      if (rf) { try { rf.call(stageEl); } catch (e) {} }          // Android; iPhone ignores
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(function () {}); // best-effort
      }
    }

    var mobileInited = false;
    function enableMobileControls() {
      mobileInited = true;
      var DOE = window.DeviceOrientationEvent;
      if (DOE && typeof DOE.requestPermission === 'function') {
        DOE.requestPermission().then(function (s) { if (s === 'granted') attachTilt(); }).catch(function () {});
      } else {
        attachTilt(); // Android / older iOS: no permission gate
      }
      attachTouch();
    }

    function attachTilt() { window.addEventListener('deviceorientation', onTilt, true); }

    // Map a normalized deviation [-1,1] to a turn input: nothing inside the
    // deadzone (so holding the start direction flies straight), then a
    // progressively stronger response the further you look.
    function tiltResponse(v) {
      var a = Math.abs(v);
      if (a <= TILT_DEADZONE) return 0;
      a = (a - TILT_DEADZONE) / (1 - TILT_DEADZONE); // rescale the live band to [0,1]
      a = Math.pow(a, TILT_EXPONENT);
      return v < 0 ? -a : a;
    }

    // Device->world rotation matrix from the orientation Euler angles (W3C ZXY).
    var DEG = Math.PI / 180;
    function orientationMatrix(alpha, beta, gamma) {
      var x = beta * DEG, y = gamma * DEG, z = alpha * DEG;
      var cX = Math.cos(x), cY = Math.cos(y), cZ = Math.cos(z);
      var sX = Math.sin(x), sY = Math.sin(y), sZ = Math.sin(z);
      return [
        cZ * cY - sZ * sX * sY,  -cX * sZ,  cZ * sY + cY * sX * sZ, // row 0 (m11..m13)
        cY * sZ + cZ * sX * sY,   cZ * cX,  sZ * sY - cZ * cY * sX, // row 1 (m21..m23)
        -cX * sY,                 sX,       cX * cY                 // row 2 (m31..m33)
      ];
    }

    var tiltBase = null, sDH = 0, sDE = 0, sDR = 0, lastBank = 0;
    // Phone bank (roll about the direction it points): the signed angle of the
    // screen-up vector away from "world up projected onto the screen plane".
    function bankAngle(R, pE, pN, pU) {
      var uE = R[1], uN = R[4], uU = R[7];                 // screen-up = device +Y in world
      var rE = -pU * pE, rN = -pU * pN, rU = 1 - pU * pU;  // world-up perpendicular to pointing
      var rl = Math.sqrt(rE * rE + rN * rN + rU * rU);
      if (rl < 0.2) return lastBank;                       // pointing near vertical: bank ill-defined
      rE /= rl; rN /= rl; rU /= rl;
      var cosT = uE * rE + uN * rN + uU * rU;
      var cE = pN * rU - pU * rN, cN = pU * rE - pE * rU, cU = pE * rN - pN * rE; // pointing x refUp
      var sinT = uE * cE + uN * cN + uU * cU;
      lastBank = Math.atan2(sinT, cosT) / DEG;
      return lastBank;
    }
    function onTilt(e) {
      if (e.alpha === null && e.beta === null && e.gamma === null) return;
      var R = orientationMatrix(e.alpha || 0, e.beta || 0, e.gamma || 0);
      // Where the back of the phone points, in world axes (East, North, Up):
      // device -Z mapped to world = -(m13, m23, m33).
      var pE = -R[2], pN = -R[5], pU = -R[8];
      var heading = Math.atan2(pE, pN) / DEG;                       // 0 = North, + = East (look right)
      var elevation = Math.asin(Math.max(-1, Math.min(1, pU))) / DEG; // + = looking up
      var bank = bankAngle(R, pE, pN, pU);
      if (!tiltBase) { tiltBase = { h: heading, e: elevation, b: bank }; return; } // calibrate "forward"

      var dH = ((heading - tiltBase.h + 540) % 360) - 180;         // wrapped to [-180,180]
      var dE = elevation - tiltBase.e;
      var dR = ((bank - tiltBase.b + 540) % 360) - 180;
      sDH += TILT_SMOOTH * (dH - sDH);
      sDE += TILT_SMOOTH * (dE - sDE);
      sDR += TILT_SMOOTH * (dR - sDR);

      // look right -> turn right (nx>0); look up -> go up (aim y is +down, so negate)
      var nx = tiltResponse(clamp(sDH / YAW_RANGE, -1, 1)) * (TILT_INVERT_X ? -1 : 1);
      var ny = tiltResponse(clamp(-sDE / PITCH_RANGE, -1, 1)) * (TILT_INVERT_Y ? -1 : 1);
      setAim(nx, ny);

      // bank the phone -> roll the ship
      var roll = tiltResponse(clamp(sDR / ROLL_RANGE, -1, 1)) * (TILT_INVERT_ROLL ? -1 : 1);
      if (Module._web_set_roll) Module._web_set_roll(roll);
    }

    // Touch: a stationary touch fires (tap or hold); a moving touch zooms the camera.
    var touchActive = false, touchMode = '', touchStartY = 0, lastY = 0, touchMoved = 0;
    function attachTouch() {
      canvas.addEventListener('touchstart', onTouchStart, { passive: false });
      canvas.addEventListener('touchmove', onTouchMove, { passive: false });
      canvas.addEventListener('touchend', onTouchEnd);
      canvas.addEventListener('touchcancel', onTouchEnd);
    }
    function onTouchStart(e) {
      e.preventDefault();
      var t = e.changedTouches[0];
      touchActive = true; touchMode = 'tap'; touchStartY = lastY = t.clientY; touchMoved = 0;
      if (Module._web_set_shooting) Module._web_set_shooting(1);
    }
    function onTouchMove(e) {
      e.preventDefault();
      if (!touchActive) return;
      var t = e.changedTouches[0];
      var dy = t.clientY - lastY;
      lastY = t.clientY;
      touchMoved += Math.abs(t.clientY - touchStartY);
      if (touchMode === 'tap' && touchMoved > 14) {  // it's a slide, not a tap: stop firing, zoom
        touchMode = 'zoom';
        if (Module._web_set_shooting) Module._web_set_shooting(0);
      }
      if (touchMode === 'zoom' && Module._web_zoom) {
        Module._web_zoom(dy * ZOOM_SCALE);  // finger up -> closer, down -> further
      }
    }
    function onTouchEnd() {
      touchActive = false;
      if (Module._web_set_shooting) Module._web_set_shooting(0);
    }

    function updatePortrait() {
      if (!document.body.classList.contains('app')) return;
      document.body.classList.toggle('portrait', window.matchMedia('(orientation: portrait)').matches);
    }
    window.addEventListener('resize', updatePortrait);
    window.addEventListener('orientationchange', function () {
      tiltBase = null;                       // recalibrate neutral after a rotation
      setTimeout(updatePortrait, 250);
    });

    var Module = {
      canvas: canvas,
      // Emscripten calls this with download/prepare progress like "... (x/y)".
      setStatus: function (text) {
        if (runtimeReady) return;
        var fill = document.getElementById('loadbar-fill');
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        if (m) {
          fill.style.width = Math.max(3, Math.round(parseInt(m[2], 10) / parseInt(m[4], 10) * 100)) + '%';
        } else if (!text) {
          fill.style.width = '100%';
        }
      },
      onRuntimeInitialized: function () {
        // Play is enabled by the first gameUpdate (which only fires once the
        // game loop — and therefore the WebGL2 context — is actually up). If
        // that never happens, the context failed: show an error, don't hang.
        setTimeout(function () {
          if (!runtimeReady && hasWebGL2) {
            document.getElementById('menu-msg').innerHTML =
              'Couldn’t start WebGL2.<br>Try an updated or different browser.';
            playBtn.style.display = 'none';
          }
        }, 6000);
      },
      print: function (t) { console.log(t); },
      printErr: function (t) { console.error(t); },
    };
    setReadyUI(); // surface a WebGL2-unsupported message immediately if needed
  </script>
  <script async type="text/javascript" src="StarFox_run.js"></script>
</body>
</html>
